name: Sync Instagram Pub Events

on:
  schedule:
    # Every Thursday at 9am UTC (mid-week, after Monday's main scrape)
    - cron: '0 9 * * 4'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run Instagram scraper
        env:
          IG_COOKIES: ${{ secrets.IG_COOKIES }}
        run: node --experimental-vm-modules scripts/ig-pubs-scraper.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json images/ig-events/
          git diff --staged --quiet || git commit -m "Auto: sync pub Instagram events [skip ci]"
          for i in 1 2 3; do git push && break || sleep 10; done
